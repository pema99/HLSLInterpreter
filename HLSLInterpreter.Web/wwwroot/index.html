<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HLSL Interpreter</title>
    <base href="/" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="css/app.css" />
    <link href="HLSLInterpreter.Web.styles.css" rel="stylesheet" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #1e1e1e;
            color: #d4d4d4;
            overflow: hidden;
        }

        #app {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .loading-progress {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .loading-progress circle {
            fill: none;
            stroke: #007acc;
            stroke-width: 0.6rem;
            transform-origin: 50% 50%;
            transform: rotate(-90deg);
        }

        .loading-progress circle:last-child {
            stroke: #333;
            animation: loading-progress-spin 1.5s linear infinite;
        }

        @keyframes loading-progress-spin {
            100% { transform: rotate(270deg); }
        }

        .loading-progress-text {
            position: fixed;
            top: calc(50% + 3.5rem);
            left: 50%;
            transform: translate(-50%, -50%);
            color: #888;
            font-size: 0.85rem;
            text-align: center;
        }

        #blazor-error-ui {
            background: #c00;
            bottom: 0;
            display: none;
            left: 0;
            padding: 0.6rem 1.25rem;
            position: fixed;
            width: 100%;
            z-index: 1000;
            color: white;
        }

        #blazor-error-ui .dismiss {
            cursor: pointer;
            position: absolute;
            right: 0.75rem;
            top: 0.5rem;
        }
    </style>
</head>

<body>
    <div id="app">
        <svg class="loading-progress" width="80" height="80" viewBox="0 0 80 80">
            <circle r="30%" cx="50%" cy="50%" />
            <circle r="30%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text">Loading HLSL Interpreter...</div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">&#10006;</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.0/min/vs/loader.js"></script>
    <script>
        window.monacoEditorInitialized = false;
        window._monacoEditor = null;

        window.initMonaco = function (containerId, initialCode) {
            require.config({
                paths: { 'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.0/min/vs' }
            });
            require(['vs/editor/editor.main'], function () {
                // Register a basic HLSL language (based on C)
                monaco.languages.register({ id: 'hlsl' });
                monaco.languages.setMonarchTokensProvider('hlsl', {
                    keywords: [
                        'if', 'else', 'for', 'while', 'do', 'switch', 'case', 'break', 'continue',
                        'return', 'true', 'false', 'struct', 'typedef', 'void',
                        'float', 'float2', 'float3', 'float4',
                        'float2x2', 'float3x3', 'float4x4',
                        'int', 'int2', 'int3', 'int4',
                        'uint', 'uint2', 'uint3', 'uint4',
                        'bool', 'bool2', 'bool3', 'bool4',
                        'half', 'double', 'min16float', 'min16int',
                        'in', 'out', 'inout', 'static', 'const', 'uniform',
                        'Texture2D', 'SamplerState', 'cbuffer', 'register',
                    ],
                    typeKeywords: [
                        'float', 'int', 'uint', 'bool', 'half', 'double', 'void',
                        'float2', 'float3', 'float4', 'int2', 'int3', 'int4',
                    ],
                    operators: [
                        '=', '>', '<', '!', '~', '?', ':', '==', '<=', '>=', '!=',
                        '&&', '||', '++', '--', '+', '-', '*', '/', '&', '|', '^', '%',
                        '<<', '>>', '>>>', '+=', '-=', '*=', '/=', '&=', '|=', '^=',
                        '%=', '<<=', '>>=', '>>>=',
                    ],
                    symbols: /[=><!~?:&|+\-*\/\^%]+/,
                    tokenizer: {
                        root: [
                            [/\[.*?\]/, 'annotation'],
                            [/[a-z_$][\w$]*/, {
                                cases: {
                                    '@keywords': 'keyword',
                                    '@typeKeywords': 'type.identifier',
                                    '@default': 'identifier',
                                }
                            }],
                            { include: '@whitespace' },
                            [/[{}()\[\]]/, '@brackets'],
                            [/@symbols/, {
                                cases: {
                                    '@operators': 'operator',
                                    '@default': '',
                                }
                            }],
                            [/\d*\.\d+([eE][\-+]?\d+)?[fFdD]?/, 'number.float'],
                            [/\d+[fF]/, 'number.float'],
                            [/0[xX][0-9a-fA-F]+/, 'number.hex'],
                            [/\d+/, 'number'],
                            [/"([^"\\]|\\.)*$/, 'string.invalid'],
                            [/"/, 'string', '@string'],
                        ],
                        whitespace: [
                            [/[ \t\r\n]+/, ''],
                            [/\/\*/, 'comment', '@comment'],
                            [/\/\/.*$/, 'comment'],
                        ],
                        comment: [
                            [/[^\/*]+/, 'comment'],
                            [/\/\*/, 'comment', '@push'],
                            [/\*\//, 'comment', '@pop'],
                            [/[\/*]/, 'comment'],
                        ],
                        string: [
                            [/[^\\"]+/, 'string'],
                            [/\\./, 'string.escape.invalid'],
                            [/"/, 'string', '@pop'],
                        ],
                    },
                });

                monaco.editor.defineTheme('hlsl-dark', {
                    base: 'vs-dark',
                    inherit: true,
                    rules: [
                        { token: 'annotation', foreground: 'c8c8c8', fontStyle: 'italic' },
                        { token: 'keyword', foreground: '569cd6' },
                        { token: 'type.identifier', foreground: '4ec9b0' },
                        { token: 'number', foreground: 'b5cea8' },
                        { token: 'number.float', foreground: 'b5cea8' },
                        { token: 'string', foreground: 'ce9178' },
                        { token: 'comment', foreground: '6a9955' },
                        { token: 'operator', foreground: 'd4d4d4' },
                    ],
                    colors: {}
                });

                window._monacoEditor = monaco.editor.create(document.getElementById(containerId), {
                    value: initialCode,
                    language: 'hlsl',
                    theme: 'hlsl-dark',
                    fontSize: 14,
                    lineNumbers: 'on',
                    minimap: { enabled: false },
                    scrollBeyondLastLine: false,
                    automaticLayout: true,
                    wordWrap: 'off',
                    tabSize: 4,
                    insertSpaces: true,
                });

                window._monacoEditor.addCommand(
                    monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter,
                    function () { document.querySelector('.btn-run').click(); }
                );

                window.monacoEditorInitialized = true;
            });
        };

        window.renderPixels = function (canvasId, rgbaData, width, height) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            const imageData = new ImageData(new Uint8ClampedArray(rgbaData), width, height);
            ctx.putImageData(imageData, 0, 0);
        };

        window.getMonacoValue = function () {
            if (window._monacoEditor) {
                return window._monacoEditor.getValue();
            }
            return '';
        };

        window.setMonacoValue = function (value) {
            if (window._monacoEditor) {
                window._monacoEditor.setValue(value);
            }
        };
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
